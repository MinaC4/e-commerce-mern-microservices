apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: eshtry-mny-ingress
spec:
  ingressClassName: {{ .Values.ingress.className }}
  rules:
  - host: {{ .Values.ingress.host }}
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend
            port:
              number: 5173

      - path: /users
        pathType: Prefix
        backend:
          service:
            name: user-service
            port:
              number: 9001

      - path: /products
        pathType: Prefix
        backend:
          service:
            name: product-service
            port:
              number: 9000

      - path: /cart
        pathType: Prefix
        backend:
          service:
            name: cart-service
            port:
              number: 9003
