apiVersion: apps/v1
kind: Deployment
metadata:
  name: cart-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cart-service
  template:
    metadata:
      labels:
        app: cart-service
    spec:
      containers:
      - name: cart-service
        image: minac4/eshtry-mny-cart:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 9003
        envFrom:
        - secretRef:
            name: app-secrets
        - configMapRef:
            name: app-config
